on : push 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build Docker image
        run: 
          docker build -t flask-app .
      - name: Run Docker container
        run: 
          docker run --name flask-container -d -p 5000:5000 flask-app

      - name: wait
        run: sleep 10

      - name: Test health endpoint
        run: |
            for i in $(seq 1 10); do
            curl -s http://localhost:5000/health && echo "App is up" && exit 0
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
            done 
            echo "App failed to start" && exit 1

      - name: Shut down Docker container
        run: docker stop flask-container && docker rm flask-container  

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest   